<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GuaicoChelas | Carta Interactiva</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #011A1E;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .portada {
      width: min(90%, 430px);
      padding: 30px 20px;
    }

    .logo {
      width: 230px;
      max-width: 80%;
      margin-bottom: 20px;
      border-radius: 50%;
    }

    h1 {
      margin: 0 0 12px;
      color: #FF3300;
      font-size: 2.4rem;
    }

    .eslogan {
      margin: 0;
      color: #D4F7B3;
      font-size: 1.2rem;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="portada">
    <img
      src="logo-guaicochelas.jpg"
      alt="Logo de GuaicoChelas"
      class="logo"
    >

    <h1>GuaicoChelas</h1>

    <p class="eslogan">
      Más que una bebida,<br>
      una experiencia.
    </p>
  </main>
</body>
</html>
