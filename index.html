<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GuaicoChelas | Carta Interactiva</title>

  <style>
    :root {
      --fondo: #011A1E;
      --rojo: #FF3300;
      --verde: #D4F7B3;
      --blanco: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--fondo);
      color: var(--blanco);
      font-family: Arial, Helvetica, sans-serif;
    }

    .pantalla {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .pantalla.activa {
      display: flex;
    }

    .contenido {
      width: min(100%, 440px);
      text-align: center;
    }

    .logo {
      width: 230px;
      max-width: 78%;
      display: block;
      margin: 0 auto 18px;
      border-radius: 50%;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      color: var(--rojo);
      font-size: clamp(2rem, 8vw, 2.8rem);
    }

    h2 {
      margin: 0 0 10px;
      color: var(--rojo);
      font-size: 2rem;
    }

    .eslogan {
      margin: 14px 0 30px;
      color: var(--verde);
      font-size: 1.22rem;
      line-height: 1.45;
    }

    .texto-categorias {
      margin: 0 0 24px;
      color: var(--verde);
      font-size: 1.1rem;
    }

    .botones,
    .categorias {
      display: grid;
      gap: 14px;
    }

    .boton {
      width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 20px;
      border-radius: 16px;
      font-size: 1.08rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .boton-principal {
      background: var(--rojo);
      color: var(--blanco);
      box-shadow: 0 10px 24px rgba(255, 51, 0, 0.25);
    }

    .boton-secundario {
      background: var(--verde);
      color: var(--fondo);
      border: 2px solid var(--verde);
    }

    .categoria {
      background: var(--verde);
      color: var(--fondo);
      border: 3px solid transparent;
    }

    .categoria:hover,
    .categoria:focus {
      border-color: var(--rojo);
    }

    .boton-volver {
      margin-top: 22px;
      background: transparent;
      color: var(--verde);
      border: 2px solid var(--verde);
    }

    .boton:hover,
    .boton:focus {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .ubicacion {
      margin: 26px 0 0;
      color: var(--verde);
    }

    .redes-sociales {
      margin-top: 24px;
    }

    .titulo-redes {
      margin: 0 0 14px;
      color: var(--blanco);
      font-size: 0.92rem;
      opacity: 0.8;
    }

    .iconos-redes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .red-social {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      overflow: hidden;
      border-radius: 50%;
      background: var(--blanco);
      border: 2px solid var(--verde);
      text-decoration: none;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.25);
      transition:
        transform 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .red-social:hover,
    .red-social:focus {
      transform: translateY(-3px) scale(1.04);
      border-color: var(--rojo);
      box-shadow: 0 9px 22px rgba(255, 51, 0, 0.25);
    }

    .logo-red-social {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .pie {
      margin-top: 18px;
      color: var(--blanco);
      opacity: 0.72;
      font-size: 0.88rem;
    }

    @media (max-width: 420px) {
      .pantalla {
        padding: 18px;
      }

      .logo {
        width: 205px;
      }

      .boton {
        min-height: 56px;
        font-size: 1rem;
      }

      .red-social {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>

<body>

  <!-- Pantalla de bienvenida -->
  <main id="inicio" class="pantalla activa">
    <section class="contenido">

      <img
        src="logo-guaicochelas.jpg"
        alt="Logo oficial de GuaicoChelas"
        class="logo"
      >

      <h1>GuaicoChelas</h1>

      <p class="eslogan">
        Más que una bebida,<br>
        una experiencia.
      </p>

      <div class="botones">

        <button
          type="button"
          class="boton boton-principal"
          onclick="mostrarCategorias()"
        >
          🍺 Entrar a la carta
        </button>

        <a
          href="#"
          class="boton boton-secundario"
        >
          📄 Ver carta PDF
        </a>

      </div>

      <p class="ubicacion">
        📍 Sandoná, Nariño
      </p>

      <!-- Redes sociales -->
      <div class="redes-sociales">

        <p class="titulo-redes">
          Síguenos en nuestras redes
        </p>

        <div class="iconos-redes">

          <a
            href="https://www.instagram.com/guaicochelas?igsh=MWczNmxreTkzdXB0dw=="
            class="red-social"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram de GuaicoChelas"
            title="Instagram"
          >
            <img
              src="Logo_Instagram.png"
              alt="Logo de Instagram"
              class="logo-red-social"
            >
          </a>

          <a
            href="https://www.facebook.com/share/17zmut9BG1/"
            class="red-social"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Facebook de GuaicoChelas"
            title="Facebook"
          >
            <img
              src="Logo_Facebook.png"
              alt="Logo de Facebook"
              class="logo-red-social"
            >
          </a>

          <a
            href="https://vt.tiktok.com/ZSXfL4mhr/"
            class="red-social"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="TikTok de GuaicoChelas"
            title="TikTok"
          >
            <img
              src="Logo_Tik_Tok.png"
              alt="Logo de TikTok"
              class="logo-red-social"
            >
          </a>

        </div>

      </div>

      <p class="pie">
        Carta interactiva oficial
      </p>

    </section>
  </main>

  <!-- Pantalla de categorías -->
  <section id="menu" class="pantalla">
    <div class="contenido">

      <h2>Nuestra carta</h2>

      <p class="texto-categorias">
        ¿Qué deseas disfrutar hoy?
      </p>

      <div class="categorias">

        <button
          type="button"
          class="boton categoria"
          onclick="mostrarMicheladas()"
        >
          🍺 Micheladas
        </button>

        <button
          type="button"
          class="boton categoria"
        >
          🍹 Cócteles granizados
        </button>

        <button
          type="button"
          class="boton categoria"
        >
          🥭 Mangomanía
        </button>

        <button
          type="button"
          class="boton categoria"
        >
          🥤 Sodas sin alcohol
        </button>

      </div>

      <button
        type="button"
        class="boton boton-volver"
        onclick="volverInicio()"
      >
        ← Volver al inicio
      </button>

    </div>
  </section>

  <!-- Pantalla de Micheladas -->
  <section id="productos-micheladas" class="pantalla">
    <div class="contenido">

      <h2>Micheladas</h2>

      <p class="texto-categorias">
        Elige tu experiencia favorita
      </p>

      <button
        type="button"
        class="boton boton-volver"
        onclick="volverCategorias()"
      >
        ← Volver a categorías
      </button>

    </div>
  </section>

  <script>
    function ocultarPantallas() {
      document.querySelectorAll(".pantalla").forEach(function(pantalla) {
        pantalla.classList.remove("activa");
      });
    }

    function mostrarCategorias() {
      ocultarPantallas();
      document.getElementById("menu").classList.add("activa");
      window.scrollTo(0, 0);
    }

    function volverInicio() {
      ocultarPantallas();
      document.getElementById("inicio").classList.add("activa");
      window.scrollTo(0, 0);
    }

    function mostrarMicheladas() {
      ocultarPantallas();
      document
        .getElementById("productos-micheladas")
        .classList.add("activa");

      window.scrollTo(0, 0);
    }

    function volverCategorias() {
      ocultarPantallas();
      document.getElementById("menu").classList.add("activa");
      window.scrollTo(0, 0);
    }
  </script>

</body>
</html>
